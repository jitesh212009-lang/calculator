<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhai ka Calculator</title>
<style>
*{
  margin:0; padding:0; box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}
body{
  display:flex; justify-content:center; align-items:center;
  min-height:100vh; background:linear-gradient(135deg, #667eea, #764ba2);
}
.calc{
  background:#1e1e2f; padding:20px; border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3); width:320px;
}
#display{
  width:100%; height:80px; background:#2a2a40; color:#fff;
  font-size:2.5rem; text-align:right; border:none; 
  border-radius:12px; padding:10px; margin-bottom:20px;
  outline:none;
}
.buttons{
  display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
}
button{
  height:60px; border:none; border-radius:12px; font-size:1.4rem;
  cursor:pointer; transition:0.2s; font-weight:600;
}
button:active{ transform:scale(0.95); }
.num{ background:#3a3a55; color:#fff; }
.num:hover{ background:#4a4a65; }
.op{ background:#ff9500; color:#fff; }
.op:hover{ background:#ffb340; }
.clear{ background:#ff3b30; color:#fff; grid-column:span 2; }
.equal{ background:#34c759; color:#fff; grid-column:span 2; }
</style>
</head>
<body>

<div class="calc">
  <input type="text" id="display" disabled>
  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">AC</button>
    <button class="op" onclick="deleteLast()">DEL</button>
    <button class="op" onclick="append('/')">/</button>
    
    <button class="num" onclick="append('7')">7</button>
    <button class="num" onclick="append('8')">8</button>
    <button class="num" onclick="append('9')">9</button>
    <button class="op" onclick="append('*')">×</button>
    
    <button class="num" onclick="append('4')">4</button>
    <button class="num" onclick="append('5')">5</button>
    <button class="num" onclick="append('6')">6</button>
    <button class="op" onclick="append('-')">-</button>
    
    <button class="num" onclick="append('1')">1</button>
    <button class="num" onclick="append('2')">2</button>
    <button class="num" onclick="append('3')">3</button>
    <button class="op" onclick="append('+')">+</button>
    
    <button class="num" onclick="append('0')">0</button>
    <button class="num" onclick="append('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
let display = document.getElementById('display');

function append(val){
  display.value += val;
}

function clearDisplay(){
  display.value = '';
}

function deleteLast(){
  display.value = display.value.slice(0, -1);
}

function calculate(){
  try{
    display.value = eval(display.value);
  }catch{
    display.value = 'Error';
    setTimeout(clearDisplay, 1000);
  }
}

// Keyboard support bhi hai
document.addEventListener('keydown', e=>{
  if(e.key >= '0' && e.key <= '9') append(e.key);
  if(['+', '-', '*', '/','.'].includes(e.key)) append(e.key);
  if(e.key === 'Enter') calculate();
  if(e.key === 'Backspace') deleteLast();
  if(e.key === 'Escape') clearDisplay();
});
</script>

</body>
</html>
